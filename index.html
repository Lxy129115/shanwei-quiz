<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>汕尾市2026水上技能竞赛 · 刷题</title>
    <style>
        /* 全局重置与基础 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #f4f7fc;
            padding: 16px 12px 32px;
            color: #0b1a2f;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .container {
            max-width: 820px;
            margin: 0 auto;
        }

        /* 头部 */
        .header-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 6px;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #003366;
            border-left: 5px solid #1e7bb0;
            padding-left: 14px;
            line-height: 1.2;
            flex: 1;
            min-width: 180px;
        }
        .timer-badge {
            background: #1a3a5c;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            padding: 5px 16px;
            border-radius: 40px;
            white-space: nowrap;
            box-shadow: 0 2px 8px rgba(0,20,40,0.15);
            letter-spacing: 0.3px;
            flex-shrink: 0;
        }
        .timer-badge.warning {
            background: #b33c3c;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }

        .sub {
            color: #2c4c6b;
            margin-bottom: 18px;
            font-size: 0.92rem;
            padding-left: 20px;
            opacity: 0.8;
        }

        /* 统计栏 - 移动端适配 */
        .stats-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 16px;
            background: white;
            padding: 12px 16px;
            border-radius: 18px;
            box-shadow: 0 4px 12px rgba(0,20,40,0.05);
            margin-bottom: 22px;
            align-items: center;
            justify-content: space-between;
        }
        .stats {
            display: flex;
            flex-wrap: wrap;
            gap: 8px 12px;
        }
        .stats span {
            background: #eef3f9;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #004080;
            white-space: nowrap;
        }
        .stats .num {
            font-weight: 700;
            color: #0b2b4a;
        }
        .filter-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: white;
            border: 1px solid #cbdae8;
            padding: 5px 14px;
            border-radius: 30px;
            font-size: 0.78rem;
            font-weight: 500;
            color: #1f3b57;
            cursor: pointer;
            transition: 0.15s;
            touch-action: manipulation;
        }
        .filter-btn.active {
            background: #1a5a8c;
            border-color: #1a5a8c;
            color: white;
        }
        .filter-btn:active {
            transform: scale(0.96);
        }

        /* 题目卡片 */
        .question-card {
            background: white;
            border-radius: 20px;
            padding: 18px 18px 20px;
            margin-bottom: 18px;
            box-shadow: 0 4px 12px rgba(0, 20, 40, 0.04);
            border: 1px solid #e6edf6;
            transition: border 0.15s;
        }
        .question-card.correct-highlight {
            border-left: 6px solid #2a7f4b;
            background: #f6fbf9;
        }
        .question-card.wrong-highlight {
            border-left: 6px solid #b33c3c;
            background: #fdf6f6;
        }

        .q-header {
            display: flex;
            gap: 10px;
            align-items: baseline;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .q-type {
            font-size: 0.7rem;
            font-weight: 600;
            background: #d9e3ef;
            color: #1f4468;
            padding: 2px 12px;
            border-radius: 30px;
            letter-spacing: 0.2px;
        }
        .q-type.single { background: #d4e0f0; }
        .q-type.multi { background: #d3e8e0; }

        .q-text {
            font-size: 1rem;
            line-height: 1.6;
            font-weight: 500;
            margin-bottom: 14px;
            word-break: break-word;
        }

        /* 选项列表 */
        .options {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 10px 0 12px;
        }
        .option-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 12px 14px;
            border-radius: 14px;
            background: #f8faff;
            border: 1px solid #e1eaf3;
            transition: 0.1s;
            cursor: pointer;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
        }
        .option-item:active {
            transform: scale(0.98);
        }
        .option-item.selected {
            background: #e2edfd;
            border-color: #6d9fd1;
        }
        .option-item.correct-answer {
            background: #d4f0e2;
            border-color: #2a7f4b;
        }
        .option-item.wrong-answer {
            background: #fcdede;
            border-color: #b33c3c;
        }
        .option-item.disabled {
            opacity: 0.75;
            cursor: default;
            pointer-events: none;
        }
        .option-marker {
            font-weight: 600;
            color: #1f4970;
            min-width: 24px;
            flex-shrink: 0;
        }
        .option-text {
            flex: 1;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        /* 按钮 */
        .btn {
            background: white;
            border: 1px solid #b7ccdf;
            padding: 8px 20px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.85rem;
            color: #003366;
            cursor: pointer;
            transition: 0.12s;
            touch-action: manipulation;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            min-height: 44px;
        }
        .btn:active {
            transform: scale(0.96);
        }
        .btn-primary {
            background: #1a5a8c;
            border-color: #1a5a8c;
            color: white;
        }
        .btn-primary:active { background: #0f4a75; }
        .btn-outline {
            background: transparent;
            border-color: #b0c8df;
        }
        .btn-outline:active { background: #eaf1fa; }
        .btn-success {
            background: #1f7b4a;
            border-color: #1f7b4a;
            color: white;
        }
        .btn-success:active { background: #14633b; }
        .btn-danger {
            background: #b33c3c;
            border-color: #b33c3c;
            color: white;
        }
        .btn-danger:active { background: #962e2e; }
        .btn:disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        .action-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-top: 14px;
            gap: 10px;
        }
        .action-row .status {
            font-size: 0.8rem;
            color: #3f6185;
        }

        /* 多选提交区域 */
        .multi-submit-area {
            margin-top: 10px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .multi-submit-area .btn {
            padding: 6px 18px;
            font-size: 0.82rem;
            min-height: 40px;
        }
        .multi-submit-area .hint {
            font-size: 0.8rem;
            color: #5f7a99;
        }

        /* 反馈信息 */
        .feedback {
            margin-top: 8px;
            font-size: 0.92rem;
            padding: 8px 14px;
            border-radius: 12px;
            background: #f0f5fe;
            color: #00407a;
            line-height: 1.4;
        }
        .feedback.correct {
            background: #ddf0e6;
            color: #105a34;
        }
        .feedback.wrong {
            background: #fae2e2;
            color: #9e2b2b;
        }
        .feedback .answer-reveal {
            font-weight: 600;
        }

        /* 超时提示 */
        .timeout-overlay {
            background: #fdf2f2;
            border: 2px solid #b33c3c;
            border-radius: 16px;
            padding: 14px 20px;
            margin-bottom: 22px;
            text-align: center;
            font-weight: 600;
            color: #b33c3c;
            font-size: 1.05rem;
        }

        /* 底部按钮组 */
        .reset-area {
            margin-top: 28px;
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
        }
        .reset-area .btn {
            flex: 1 1 auto;
            min-width: 100px;
            justify-content: center;
        }

        .footer {
            margin-top: 32px;
            text-align: center;
            color: #5f7a99;
            font-size: 0.78rem;
            border-top: 1px solid #d3e0ed;
            padding-top: 20px;
            line-height: 1.5;
        }

        /* 移动端优化 */
        @media (max-width: 600px) {
            body { padding: 12px 10px 24px; }
            h1 { font-size: 1.25rem; padding-left: 12px; }
            .timer-badge { font-size: 0.85rem; padding: 4px 12px; }
            .sub { font-size: 0.82rem; padding-left: 16px; }
            .stats-bar { padding: 10px 12px; gap: 8px; }
            .stats span { font-size: 0.7rem; padding: 3px 10px; }
            .filter-btn { font-size: 0.7rem; padding: 4px 10px; }
            .question-card { padding: 14px 14px 16px; }
            .q-text { font-size: 0.92rem; }
            .option-item { padding: 10px 12px; }
            .option-text { font-size: 0.88rem; }
            .btn { font-size: 0.8rem; padding: 6px 16px; min-height: 40px; }
            .feedback { font-size: 0.85rem; padding: 6px 12px; }
            .reset-area .btn { min-width: 80px; }
        }
        @media (max-width: 400px) {
            .header-row { flex-direction: column; align-items: stretch; }
            .timer-badge { text-align: center; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 头部 -->
    <div class="header-row">
        <h1>⚓ 汕尾市2026 · 技能竞赛</h1>
        <span class="timer-badge" id="timerDisplay">⏱️ 20:00</span>
    </div>
    <div class="sub">复习题库 · 单选58题 + 多选31题 · 多选需点击「提交」</div>

    <!-- 统计栏 -->
    <div class="stats-bar">
        <div class="stats">
            <span>📝 总题 <span class="num" id="totalCount">89</span></span>
            <span>✅ 已答 <span class="num" id="answeredCount">0</span></span>
            <span>🎯 正确 <span class="num" id="correctCount">0</span></span>
        </div>
        <div class="filter-group">
            <button class="filter-btn active" data-filter="all">全部</button>
            <button class="filter-btn" data-filter="single">单选</button>
            <button class="filter-btn" data-filter="multi">多选</button>
            <button class="filter-btn" data-filter="unanswered">未答</button>
        </div>
    </div>

    <!-- 超时提示 -->
    <div id="timeoutMessage" style="display:none;" class="timeout-overlay">
        ⏰ 时间到！答题已锁定，请查看结果。
    </div>

    <!-- 题目列表 -->
    <div id="questionList"></div>

    <!-- 底部按钮 -->
    <div class="reset-area">
        <button class="btn btn-outline" id="resetProgressBtn">🔄 重置进度</button>
        <button class="btn btn-outline" id="resetAllBtn">🗑️ 清空所有</button>
        <button class="btn btn-primary" id="restartTimerBtn">⏱️ 重新计时</button>
    </div>
    <div class="footer">点击选项自测 · 绿色=正确 红色=错误 · 多选需点击「提交答案」</div>
</div>

<script>
    (function() {
        // ===== 原始数据 (单选58题 + 多选31题) =====
        const rawQuestions = [
            // 单选 1~58
            { id: 1, type: 'single', text: '推动海洋经济高质量发展要坚持 "五个更加注重"，下列不属于的是（  ）', options: ['A. 更加注重创新驱动', 'B. 更加注重人海和谐', 'C. 更加注重规模速度', 'D. 更加注重合作共赢'], answer: 'C' },
            { id: 2, type: 'single', text: '发展海洋经济、海洋科研是推动我们（  ）很重要的一个方面，一定要抓好。', options: ['A. 强国战略', 'B. 经济增长', 'C. 外贸出口', 'D. 民生改善'], answer: 'A' },
            { id: 3, type: 'single', text: '习近平总书记强调，建设海洋强国必须大力发展（  ）', options: ['A. 海洋传统产业', 'B. 海洋高新技术', 'C. 海洋捕捞业', 'D. 海洋旅游业'], answer: 'B' },
            { id: 4, type: 'single', text: '习近平总书记提出的海洋经济 "五个更加注重" 不包括（  ）', options: ['A. 创新驱动', 'B. 高效协同', 'C. 产业规模', 'D. 人海和谐'], answer: 'C' },
            { id: 5, type: 'single', text: '向海图强的核心是（  ）', options: ['A. 扩大捕捞', 'B. 海洋科技自立自强', 'C. 增加港口数量', 'D. 发展滨海旅游'], answer: 'B' },
            { id: 6, type: 'single', text: '习近平总书记强调，发展决不能以牺牲人的生命为代价，这必须作为一条（  ）', options: ['A. 弹性要求', 'B. 不可逾越的红线', 'C. 参考标准', 'D. 阶段性规定'], answer: 'B' },
            { id: 7, type: 'single', text: '各级党委和政府必须把安全生产摆到重要位置，树牢（  ）理念。', options: ['A. 效益优先', 'B. 安全发展', 'C. 速度第一', 'D. 成本可控'], answer: 'B' },
            { id: 8, type: 'single', text: '落实安全生产责任制，要做到（  ）、"一岗双责"、齐抓共管、失职追责。', options: ['A. 党政同责', 'B. 企业主责', 'C. 政府主责', 'D. 部门专责'], answer: 'A' },
            { id: 9, type: 'single', text: '习近平总书记强调，安全生产要做到警钟长鸣，用事故教训推动安全生产工作，做到"（  ）"。', options: ['A. 一地出事故、全国受教育', 'B. 一厂出事故、万厂受教育，一地有隐患、全国受警示', 'C. 一厂出事故、全国受教育', 'D. 一地有隐患、万厂受警示'], answer: 'B' },
            { id: 10, type: 'single', text: '安全生产红线是指（  ）', options: ['A. 不能发生死亡事故', 'B. 不能以牺牲安全为代价发展', 'C. 必须零事故', 'D. 必须投入安全经费'], answer: 'B' },
            { id: 11, type: 'single', text: '《海上交通安全法》最新修订施行时间是（  ）', options: ['A. 2016 年', 'B. 2018 年', 'C. 2020 年', 'D. 2021 年'], answer: 'D' },
            { id: 12, type: 'single', text: '海上交通安全工作坚持（  ）、预防为主、便利通行、依法管理原则。', options: ['A. 安全第一', 'B. 效率优先', 'C. 服务优先', 'D. 管控优先'], answer: 'A' },
            { id: 13, type: 'single', text: '在中华人民共和国（  ）内从事航行、停泊、作业等活动，适用《海上交通安全法》。', options: ['A. 领海', 'B. 管辖海域', 'C. 内水', 'D. 专属经济区'], answer: 'B' },
            { id: 14, type: 'single', text: '海上交通事故发生后，当事船舶应立即向（  ）报告。', options: ['A. 就近海事管理机构', 'B. 港口企业', 'C. 船公司', 'D. 边防部门'], answer: 'A' },
            { id: 15, type: 'single', text: '国家实行捕捞许可证制度，捕捞许可证由（  ）发放。', options: ['A. 生态环境部', 'B. 农业农村部（渔业主管部门）', 'C. 海事部门', 'D. 自然资源部门'], answer: 'B' },
            { id: 16, type: 'single', text: '禁渔期、禁渔区由（  ）规定。', options: ['A. 县级政府', 'B. 省级政府', 'C. 国家渔业主管部门', 'D. 地方渔业部门'], answer: 'C' },
            { id: 17, type: 'single', text: '船舶发生油类火灾，最适宜优先使用的灭火器材是（  ）', options: ['A. 清水', 'B. 泡沫灭火器', 'C. 干粉灭火器', 'D. 二氧化碳灭火器'], answer: 'B' },
            { id: 18, type: 'single', text: '环境保护坚持保护优先、预防为主、综合治理、（  ）、损害担责的原则。', options: ['A. 政府负责', 'B. 公众参与', 'C. 企业负责', 'D. 部门联动'], answer: 'B' },
            { id: 19, type: 'single', text: '根据《中华人民共和国环境保护法》，每年（  ）为环境日。', options: ['A. 3月12日', 'B. 4月22日', 'C. 6月5日', 'D. 7月11日'], answer: 'C' },
            { id: 20, type: 'single', text: '国家在重点生态功能区、生态环境敏感区和脆弱区等区域划定（  ）。', options: ['A. 开发红线', 'B. 生态保护红线', 'C. 建设红线', 'D. 管理红线'], answer: 'B' },
            { id: 21, type: 'single', text: '生态保护红线内（  ）', options: ['A. 禁止开发建设', 'B. 限制开发建设', 'C. 可以适度开发', 'D. 无特殊限制'], answer: 'A' },
            { id: 22, type: 'single', text: '《国际海上避碰规则》适用范围是（  ）', options: ['A. 公海', 'B. 连接公海并可供海船航行的一切水域', 'C. 领海', 'D. 内水'], answer: 'B' },
            { id: 23, type: 'single', text: '两机动船对遇时，应（  ）', options: ['A. 各自向右避让', 'B. 各自向左避让', 'C. 一船停船', 'D. 一船减速'], answer: 'A' },
            { id: 24, type: 'single', text: '帆船与机动船相遇，机动船应（  ）', options: ['A. 让路', 'B. 保速保向', 'C. 鸣放信号', 'D. 加速通过'], answer: 'A' },
            { id: 25, type: 'single', text: '船舶发生电器火灾，断电后优先选用哪种灭火器扑救最合适（  ）', options: ['A. 清水灭火器', 'B. 泡沫灭火器', 'C. 二氧化碳灭火器', 'D. 沙土'], answer: 'C' },
            { id: 26, type: 'single', text: '船舶消防原则是（  ）', options: ['A. 先控制、后消灭', 'B. 先灭火、后控制', 'C. 先撤离、后报告', 'D. 先报告、后灭火'], answer: 'A' },
            { id: 27, type: 'single', text: '船舶消防工作的基本方针是（  ）。', options: ['A. "安全第一、预防为主"', 'B. "预防为主、防消结合"', 'C. "以防为主、以消为辅"', 'D. "全员消防、重在预防"'], answer: 'B' },
            { id: 28, type: 'single', text: '使用二氧化碳灭火器灭火时，应喷向火的_______部位。', options: ['A. 周围', 'B. 上部', 'C. 根部', 'D. 以上都对'], answer: 'C' },
            { id: 29, type: 'single', text: '船舶固定式CO₂钢瓶的重量在减少_______以上时，应重新充装。', options: ['A. 5%', 'B. 10%', 'C. 15%', 'D. 20%'], answer: 'B' },
            { id: 30, type: 'single', text: '油火不能用（  ）扑救。', options: ['A. 泡沫', 'B. 二氧化碳', 'C. 水', 'D. 干粉'], answer: 'C' },
            { id: 31, type: 'single', text: '船舶进入渔船密集区，应（  ）', options: ['A. 保持自动舵', 'B. 改用手操舵', 'C. 加速通过', 'D. 减速至微速'], answer: 'B' },
            { id: 32, type: 'single', text: '商渔船避让应坚持（  ）原则。', options: ['A. 早、大、宽、清', 'B. 早、大、宽、让', 'C. 早、宽、清、让', 'D. 大、宽、清、停'], answer: 'A' },

        const answeredSpan = document.getElementById('answeredCount');
        const correctSpan = document.getElementById('correctCount');
        const filterBtns = document.querySelectorAll('.filter-btn');
        const timerDisplay = document.getElementById('timerDisplay');
        const timeoutMessage = document.getElementById('timeoutMessage');

        // ===== 计时器 =====
        function formatTime(sec) {
            const m = Math.floor(sec / 60);
            const s = sec % 60;
            return `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        function updateTimerDisplay() {
            timerDisplay.textContent = `⏱️ ${formatTime(timerSeconds)}`;
            timerDisplay.classList.toggle('warning', timerSeconds <= 60);
        }

        function stopTimer() {
            if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
        }

        function startTimer() {
            stopTimer();
            if (timerSeconds <= 0) {
                timerSeconds = 20 * 60;
                isTimeUp = false;
                timeoutMessage.style.display = 'none';
                render();
            }
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                timerSeconds--;
                updateTimerDisplay();
                if (timerSeconds <= 0) {
                    timerSeconds = 0;
                    updateTimerDisplay();
                    isTimeUp = true;
                    stopTimer();
                    timeoutMessage.style.display = 'block';
                    render();
                }
            }, 1000);
        }

        function restartTimer() {
            stopTimer();
            timerSeconds = 20 * 60;
            isTimeUp = false;
            timeoutMessage.style.display = 'none';
            updateTimerDisplay();
            startTimer();
            render();
        }

        // ===== 辅助 =====
        function normalizeAnswer(ans) {
            if (!ans) return [];
            if (Array.isArray(ans)) return ans.map(s => s.trim().toUpperCase()).filter(Boolean);
            if (typeof ans === 'string') return ans.split('').map(s => s.trim().toUpperCase()).filter(Boolean);
            return [];
        }

        function isAnswerCorrect(q) {
            if (!q.answered || q.userAnswer == null) return false;
            const correct = normalizeAnswer(q.answer);
            const user = normalizeAnswer(q.userAnswer);
            if (q.type === 'single') {
                return user.length === 1 && correct.length === 1 && user[0] === correct[0];
            }
            if (user.length !== correct.length) return false;
            const su = [...user].sort(), sc = [...correct].sort();
            return su.every((v, i) => v === sc[i]);
        }

        function computeStats() {
            const total = questions.length;
            const answered = questions.filter(q => q.answered).length;
            const correct = questions.filter(q => q.correct === true).length;
            totalSpan.textContent = total;
            answeredSpan.textContent = answered;
            correctSpan.textContent = correct;
        }

        function getFilteredQuestions() {
            if (currentFilter === 'all') return questions;
            if (currentFilter === 'single') return questions.filter(q => q.type === 'single');
            if (currentFilter === 'multi') return questions.filter(q => q.type === 'multi');
            if (currentFilter === 'unanswered') return questions.filter(q => !q.answered);
            return questions;
        }

        // ===== 渲染 =====
        function render() {
            const filtered = getFilteredQuestions();
            if (filtered.length === 0) {
                container.innerHTML = `<div style="padding: 30px 16px; text-align:center; color: #4f6f8f;">没有符合条件的题目</div>`;
                computeStats();
                return;
            }

            let html = '';
            filtered.forEach((q) => {
                const realIndex = questions.indexOf(q);
                const isSingle = q.type === 'single';
                const typeLabel = isSingle ? '单选' : '多选';
                const typeClass = isSingle ? 'single' : 'multi';

                const userAns = q.userAnswer ? normalizeAnswer(q.userAnswer) : [];
                const correctAns = normalizeAnswer(q.answer);
                const shouldDisable = isTimeUp && !q.answered;

                let optionsHtml = '';
                q.options.forEach((optText, oi) => {
                    const letter = String.fromCharCode(65 + oi);
                    const isSelected = userAns.includes(letter);
                    let extraClass = '';
                    let disabled = false;

                    if (q.answered || shouldDisable) {
                        disabled = true;
                        const isCorrectOpt = correctAns.includes(letter);
                        if (isSelected && isCorrectOpt) extraClass = 'correct-answer';
                        else if (isSelected && !isCorrectOpt) extraClass = 'wrong-answer';
                        else if (!isSelected && isCorrectOpt) extraClass = 'correct-answer';
                    } else {
                        if (isSelected) extraClass = 'selected';
                    }

                    optionsHtml += `
                        <div class="option-item ${extraClass} ${disabled ? 'disabled' : ''}" data-qidx="${realIndex}" data-letter="${letter}">
                            <span class="option-marker">${letter}.</span>
                            <span class="option-text">${optText.replace(/^[A-D]\.\s*/, '')}</span>
                        </div>
                    `;
                });

                let feedbackHtml = '';
                if (q.answered) {
                    const isCorrect = q.correct;
                    const fbClass = isCorrect ? 'correct' : 'wrong';
                    const correctDisplay = correctAns.join('、');
                    let msg = isCorrect ? '✅ 回答正确' : '❌ 回答错误';
                    feedbackHtml = `
                        <div class="feedback ${fbClass}">
                            <span class="answer-reveal">${msg}</span> 
                            ${!isCorrect ? ` 正确答案：${correctDisplay}` : ''}
                            ${isSingle ? '' : ` (选 ${correctDisplay})`}
                        </div>
                    `;
                } else if (shouldDisable) {
                    const correctDisplay = correctAns.join('、');
                    feedbackHtml = `
                        <div class="feedback wrong">
                            <span class="answer-reveal">⏰ 时间到</span> 正确答案：${correctDisplay}
                        </div>
                    `;
                }

                let cardExtra = '';
                if (q.answered && q.correct === true) cardExtra = 'correct-highlight';
                else if (q.answered && q.correct === false) cardExtra = 'wrong-highlight';
                else if (shouldDisable && !q.answered) cardExtra = 'wrong-highlight';

                let submitArea = '';
                if (q.type === 'multi' && !q.answered && !shouldDisable) {
                    const hasSelection = q.userAnswer && q.userAnswer.length > 0;
                    submitArea = `
                        <div class="multi-submit-area">
                            <button class="btn btn-primary submit-multi" data-qidx="${realIndex}" ${!hasSelection ? 'disabled' : ''}>📤 提交答案</button>
                            <span class="hint">${hasSelection ? '已选 ' + userAns.join(', ') : '请至少选择一个选项'}</span>
                        </div>
                    `;
                }

                html += `
                    <div class="question-card ${cardExtra}" data-qidx="${realIndex}">
                        <div class="q-header">
                            <span class="q-type ${typeClass}">${typeLabel}</span>
                            <span style="font-size:0.8rem; color:#3f6185;">#${realIndex+1}</span>
                        </div>
                        <div class="q-text">${q.text}</div>
                        <div class="options" data-qidx="${realIndex}">
                            ${optionsHtml}
                        </div>
                        ${submitArea}
                        ${feedbackHtml}
                        <div class="action-row">
                            <span class="status">${q.answered ? (q.correct ? '✓ 已答' : '✗ 已答') : (shouldDisable ? '⏰ 超时' : '⏳ 未答')}</span>
                            ${q.answered ? `<button class="btn btn-outline reset-one" data-qidx="${realIndex}" style="padding:4px 14px; font-size:0.78rem; min-height:32px;">↺ 重答</button>` : ''}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
            computeStats();

            // 事件绑定
            document.querySelectorAll('.option-item:not(.disabled)').forEach(el => {
                el.addEventListener('click', function(e) {
                    if (isTimeUp) return;
                    const qidx = parseInt(this.dataset.qidx);
                    const letter = this.dataset.letter;
                    handleOptionClick(qidx, letter);
                });
            });

            document.querySelectorAll('.submit-multi').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    if (isTimeUp) return;
                    const qidx = parseInt(this.dataset.qidx);
                    handleMultiSubmit(qidx);
                });
            });

            document.querySelectorAll('.reset-one').forEach(btn => {
                btn.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const qidx = parseInt(this.dataset.qidx);
                    resetSingleQuestion(qidx);
                });
            });
        }

        // ===== 交互 =====
        function handleOptionClick(qidx, letter) {
            if (isTimeUp) return;
            const q = questions[qidx];
            if (!q || q.answered) return;

            if (q.type === 'single') {
                q.userAnswer = letter;
                q.answered = true;
                q.correct = isAnswerCorrect(q);
                render();
            } else {
                if (!q.userAnswer) q.userAnswer = [];
                const arr = q.userAnswer;
                const idx = arr.indexOf(letter);
                if (idx > -1) arr.splice(idx, 1);
                else arr.push(letter);
                if (arr.length === 0) q.userAnswer = null;
                render();
            }
        }

        function handleMultiSubmit(qidx) {
            if (isTimeUp) return;
            const q = questions[qidx];
            if (!q || q.answered) return;
            if (!q.userAnswer || q.userAnswer.length === 0) {
                alert('请至少选择一个选项');
                return;
            }
            q.answered = true;
            q.correct = isAnswerCorrect(q);
            render();
        }

        function resetSingleQuestion(qidx) {
            const q = questions[qidx];
            q.userAnswer = null;
            q.answered = false;
            q.correct = null;
            render();
        }

        function resetAllProgress() {
            questions.forEach(q => {
                q.userAnswer = null;
                q.answered = false;
                q.correct = null;
            });
            render();
        }

        function resetAll() {
            resetAllProgress();
            restartTimer();
        }

        function setFilter(filter) {
            currentFilter = filter;
            filterBtns.forEach(btn => btn.classList.toggle('active', btn.dataset.filter === filter));
            render();
        }

        // ===== 初始化 =====
        filterBtns.forEach(btn => {
            btn.addEventListener('click', function() { setFilter(this.dataset.filter); });
        });

        document.getElementById('resetProgressBtn').addEventListener('click', resetAllProgress);
        document.getElementById('resetAllBtn').addEventListener('click', resetAll);
        document.getElementById('restartTimerBtn').addEventListener('click', restartTimer);

        startTimer();
        render();
    })();
</script>
</body>
</html>
