    // ================================================================
    // 随机抽题 + 组卷
    // ================================================================
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    function buildExam() {
        const judges = raw.filter(q => q.type === 'judge');
        const singles = raw.filter(q => q.type === 'single');
        const multis = raw.filter(q => q.type === 'multi');

        const shuffledJudges = shuffleArray([...judges]);
        const shuffledSingles = shuffleArray([...singles]);
        const shuffledMultis = shuffleArray([...multis]);

        const selectedJudges = shuffledJudges.slice(0, 20);
        const selectedSingles = shuffledSingles.slice(0, 52);
        const selectedMultis = shuffledMultis.slice(0, 20);

        return { judges: selectedJudges, singles: selectedSingles, multis: selectedMultis };
    }

    // 格式化正确答案显示
    function formatAnswer(q) {
        if (q.type === 'judge') return q.answer === '√' ? '√' : '×';
        if (q.type === 'single') return q.answer;
        if (q.type === 'multi') return q.answer.slice().sort().join('');
        return '';
    }

    function render() {
        let html = '';
        const groups = [
            { label: '📘 判断题（20题，每题1分）', items: currentQuestions.filter(q => q.type === 'judge') },
            { label: '📗 单选题（52题，每题1分）', items: currentQuestions.filter(q => q.type === 'single') },
            { label: '📕 多选题（20题，每题2分）', items: currentQuestions.filter(q => q.type === 'multi') }
        ];

        groups.forEach(group => {
            if (group.items.length === 0) return;
            html += `<div class="group-label">${group.label}</div>`;
            group.items.forEach((q, idx) => {
                const globalIdx = currentQuestions.indexOf(q);
                const isAnswered = q.userAnswer !== null && (Array.isArray(q.userAnswer) ? q.userAnswer.length > 0 : true);
                let statusSymbol = '';
                let correctAnswerHtml = '';
                if (isSubmitted && q.isCorrect !== null) {
                    statusSymbol = q.isCorrect ? ' ✅' : ' ❌';
                    const ansDisplay = formatAnswer(q);
                    correctAnswerHtml = `<div class="correct-answer">✅ 正确答案：${ansDisplay}</div>`;
                }
                const qTypeLabel = q.type === 'judge' ? '判断题' : q.type === 'single' ? '单选题' : '多选题';
                const qClass = isSubmitted && q.isCorrect !== null ? (q.isCorrect ? 'q-item correct' : 'q-item wrong') : 'q-item';
                let optionsHtml = '';
                if (q.type === 'judge') {
                    optionsHtml = q.options.map(opt => {
                        const checked = (q.userAnswer === opt);
                        return `<label><input type="radio" name="q_${globalIdx}" value="${opt}" ${checked?'checked':''} ${isSubmitted?'disabled':''}> ${opt}</label>`;
                    }).join('');
                } else if (q.type === 'single') {
                    optionsHtml = q.options.map((opt, oi) => {
                        const val = String.fromCharCode(65 + oi);
                        const checked = (q.userAnswer === val);
                        return `<label><input type="radio" name="q_${globalIdx}" value="${val}" ${checked?'checked':''} ${isSubmitted?'disabled':''}> ${opt}</label>`;
                    }).join('');
                } else if (q.type === 'multi') {
                    optionsHtml = q.options.map((opt, oi) => {
                        const val = String.fromCharCode(65 + oi);
                        const checked = (Array.isArray(q.userAnswer) && q.userAnswer.includes(val));
                        return `<label><input type="checkbox" name="q_${globalIdx}" value="${val}" ${checked?'checked':''} ${isSubmitted?'disabled':''}> ${opt}</label>`;
                    }).join('');
                    optionsHtml += `<span class="multi-hint">（多选）</span>`;
                }
                html += `<div class="${qClass}"><div class="q-title"><span class="q-type">${qTypeLabel}</span><span>#${q.id} ${statusSymbol}</span></div><div class="q-text">${q.text}</div><div class="options">${optionsHtml}</div>${correctAnswerHtml}</div>`;
            });
        });

        container.innerHTML = html;

        const total = currentQuestions.length;
        const answered = currentQuestions.filter(q => q.userAnswer !== null && (Array.isArray(q.userAnswer) ? q.userAnswer.length > 0 : true)).length;
        totalSpan.textContent = total;
        answeredSpan.textContent = answered;

        if (isSubmitted) {
            const correct = currentQuestions.filter(q => q.isCorrect === true).length;
            const wrong = currentQuestions.filter(q => q.isCorrect === false).length;
            let score = 0;
            currentQuestions.forEach(q => {
                if (q.isCorrect === true) {
                    if (q.type === 'multi') score += 2;
                    else score += 1;
                }
            });
            correctSpan.textContent = correct;
            wrongSpan.textContent = wrong;
            finalCorrect.textContent = correct;
            finalWrong.textContent = wrong;
            finalScore.textContent = score;
            scoreDisplay.textContent = `🏆 ${score}分`;
            resultStats.style.display = 'flex';
        } else {
            correctSpan.textContent = '—';
            wrongSpan.textContent = '—';
            scoreDisplay.textContent = '🏆 0分';
            resultStats.style.display = 'none';
        }
        attachEvents();
    }

    function attachEvents() {
        document.querySelectorAll('input[type="radio"], input[type="checkbox"]').forEach(el => {
            el.addEventListener('change', function(e) {
                if (isSubmitted) return;
                const name = this.name;
                if (!name) return;
                const idx = parseInt(name.split('_')[1]);
                const q = currentQuestions[idx];
                if (!q) return;
                if (q.type === 'judge' || q.type === 'single') {
                    const selected = document.querySelector(`input[name="${name}"]:checked`);
                    q.userAnswer = selected ? selected.value : null;
                } else if (q.type === 'multi') {
                    const checked = document.querySelectorAll(`input[name="${name}"]:checked`);
                    q.userAnswer = Array.from(checked).map(cb => cb.value);
                    if (q.userAnswer.length === 0) q.userAnswer = null;
                }
                if (!isSubmitted) q.isCorrect = null;
                render();
            });
        });
    }

    function grade() {
        if (isSubmitted) return;
        currentQuestions.forEach(q => {
            let ans = q.userAnswer;
            if (ans === null || (Array.isArray(ans) && ans.length === 0)) { q.isCorrect = false; return; }
            if (q.type === 'judge' || q.type === 'single') q.isCorrect = (ans === q.answer);
            else if (q.type === 'multi') {
                const userSorted = [...ans].sort().join('');
                const ansSorted = q.answer.slice().sort().join('');
                q.isCorrect = (userSorted === ansSorted);
            }
        });
        isSubmitted = true;
        if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
        render();
    }

    function resetExam() {
        if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
        const exam = buildExam();
        currentQuestions = [...exam.judges, ...exam.singles, ...exam.multis];
        currentQuestions.forEach(q => { q.userAnswer = null; q.isCorrect = null; });
        isSubmitted = false;
        timeSeconds = 7200;
        updateTimerDisplay();
        resultStats.style.display = 'none';
        render();
        startTimer();
    }

    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (isSubmitted) { clearInterval(timerInterval); timerInterval = null; return; }
            timeSeconds--;
            if (timeSeconds <= 0) { timeSeconds = 0; clearInterval(timerInterval); timerInterval = null; if (!isSubmitted) grade(); }
            updateTimerDisplay();
        }, 1000);
    }

    function updateTimerDisplay() {
        const mins = Math.floor(timeSeconds / 60);
        const secs = timeSeconds % 60;
        timerDisplay.textContent = `${String(mins).padStart(2,'0')}:${String(secs).padStart(2,'0')}`;
        timerDisplay.style.color = timeSeconds <= 60 ? '#b33c3c' : '#003153';
    }

    function init() {
        resetExam();
        submitBtn.addEventListener('click', function() { if (!isSubmitted) grade(); });
        resetBtn.addEventListener('click', resetExam);
    }
    init();
})();
</script>
</body>
</html>
